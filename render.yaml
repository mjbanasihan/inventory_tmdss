services:
  - type: web
    name: tsd-tmdss-inventory
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tsd-inventory-db
          property: connectionString

databases:
  - name: tsd-inventory-db
    plan: free
    databaseName: inventory
    user: inventory_user
